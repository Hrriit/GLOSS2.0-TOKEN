<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOSS Vault Design System 2.0 — Tokens</title>
<style>
:root {
  --sidebar-w: 240px;
  --topbar-h: 52px;
  --bg: #f7f8f9;
  --bg-card: #ffffff;
  --bg-sidebar: #ffffff;
  --text-1: #172b4d;
  --text-2: #44526a;
  --text-3: #8590a2;
  --border: #e8eaed;
  --border-light: #f1f3f5;
  --accent: #00c4c4;
  --accent-dark: #007b7c;
  --accent-bg: #e8fafb;
  --nav-hover: #f1f3f5;
  --nav-active-bg: #e5f0ff;
  --nav-active-text: #0052cc;
  --tab-active-bg: #ebecf7;
  --tab-active-text: #3f4692;
  --radius: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text-1); line-height:1.5; -webkit-font-smoothing:antialiased; display:flex; min-height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  height: 100vh;
  position: fixed;
  top: 0; left: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-brand {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  height: var(--topbar-h);
  flex-shrink: 0;
}
.brand-dot {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 13px; letter-spacing: -0.5px;
}
.brand-name { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
.brand-ver { font-size: 10px; color: var(--text-3); font-weight: 500; }
.sidebar-body { flex: 1; overflow-y: auto; padding: 12px 8px; }
.sidebar-group { margin-bottom: 20px; }
.sidebar-group-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 0 12px;
  margin-bottom: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-2);
  transition: background 0.1s, color 0.1s;
  user-select: none;
}
.nav-item:hover { background: var(--nav-hover); color: var(--text-1); }
.nav-item.active { background: var(--nav-active-bg); color: var(--nav-active-text); font-weight: 600; }
.nav-item .nav-count { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--text-3); background: var(--border-light); border-radius: 10px; padding: 1px 7px; }

/* mode toggle at bottom */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.mode-toggle { display: flex; background: var(--border-light); border-radius: 6px; padding: 2px; gap: 2px; }
.mode-toggle button {
  flex: 1; padding: 5px; border: none; background: none; border-radius: 4px;
  font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-3); transition: all 0.15s;
}
.mode-toggle button.active { background: var(--bg-card); color: var(--text-1); box-shadow: var(--shadow-sm); }

/* ── MAIN ── */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── TAB BAR ── */
.tabbar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 4px;
  position: sticky;
  top: 0; z-index: 50;
  height: var(--topbar-h);
}
.tab-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 14px;
  border: none;
  background: none;
  border-radius: 20px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { background: var(--nav-hover); color: var(--text-1); }
.tab-btn.active { background: var(--tab-active-bg); color: var(--tab-active-text); font-weight: 600; }

/* ── CONTENT ── */
.content { flex: 1; padding: 32px; max-width: 1100px; }
.panel { display: none; }
.panel.active { display: block; }

/* ── PAGE TITLE ── */
.page-header { margin-bottom: 28px; }
.page-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
.page-header p { font-size: 14px; color: var(--text-2); max-width: 600px; }

/* ── CARDS / TABLES ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  margin-bottom: 24px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-light);
}
.card-header h3 { font-size: 14px; font-weight: 700; }
.card-header small { font-size: 12px; color: var(--text-3); }
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 28px 0 12px;
}
.section-label:first-child { margin-top: 0; }

/* ── ARCH DIAGRAM ── */
.arch-grid { display: grid; grid-template-columns: 1fr 32px 1fr 32px 1fr; align-items: center; gap: 0; margin-bottom: 32px; }
.arch-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.arch-card.l1 { border-top: 3px solid #b9bbc6; }
.arch-card.l2 { border-top: 3px solid var(--accent); }
.arch-card.l3 { border-top: 3px solid #5472e4; }
.arch-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.arch-card p { font-size: 12px; color: var(--text-2); margin-bottom: 10px; }
.code-pill { background: var(--border-light); border-radius: 5px; padding: 7px 10px; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: var(--text-2); }
.arch-arrow { text-align: center; color: var(--text-3); font-size: 18px; }

/* ── COLOR SWATCHES ── */
.color-palette { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.color-group { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
.color-group-title { padding: 12px 16px; font-size: 13px; font-weight: 700; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; }
.color-group-title small { font-weight: 400; color: var(--text-3); font-size: 12px; }
.color-row {
  display: grid; grid-template-columns: 36px 1fr auto;
  align-items: center; gap: 10px;
  padding: 5px 16px 5px 10px;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer; transition: background 0.1s; font-size: 12px;
}
.color-row:last-child { border-bottom: none; }
.color-row:hover { background: var(--bg); }
.swatch { width: 28px; height: 28px; border-radius: 5px; border: 1px solid rgba(0,0,0,0.07); flex-shrink: 0; }
.color-step { font-weight: 600; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: var(--text-2); }
.color-hex { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: var(--text-3); text-align: right; }

/* ── TOKEN TABLE ── */
.token-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.token-table thead { background: var(--border-light); }
.token-table th { padding: 9px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); border-bottom: 1px solid var(--border); }
.token-table td { padding: 7px 16px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
.token-table tr:last-child td { border-bottom: none; }
.token-table tr { cursor: pointer; transition: background 0.08s; }
.token-table tr:hover td { background: rgba(0,100,200,0.025); }
.mini-sw { display: inline-block; width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.07); vertical-align: middle; margin-right: 7px; }
.mono { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; }
.text-muted { color: var(--text-3); }
.css-var { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: #0052cc; }
.ref-alias { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; color: var(--text-3); }
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.badge-aaa { background: #e3fcef; color: #006644; }
.badge-aa  { background: #fffae6; color: #974f0c; }
.badge-fail{ background: #ffebe6; color: #bf2600; }
.tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; background: var(--border-light); color: var(--text-3); }

/* ── SCALE ── */
.scale-list { display: grid; gap: 6px; }
.scale-row { display: grid; grid-template-columns: 100px 1fr 60px; align-items: center; gap: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 16px; cursor: pointer; transition: border-color 0.1s; }
.scale-row:hover { border-color: var(--accent); }
.scale-row .scale-name { font-weight: 700; font-size: 13px; font-family: 'SF Mono','Fira Code',monospace; }
.scale-track { height: 6px; background: var(--accent); opacity: 0.5; border-radius: 3px; }
.scale-px { font-size: 12px; color: var(--text-3); text-align: right; font-family: 'SF Mono',monospace; }

/* ── TYPE PREVIEW ── */
.type-rows { display: grid; gap: 0; }
.type-row { display: grid; grid-template-columns: 120px 90px 1fr; align-items: center; gap: 16px; padding: 10px 20px; border-bottom: 1px solid var(--border-light); background: var(--bg-card); }
.type-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.type-row:last-child { border-bottom: none; border-radius: 0 0 var(--radius) var(--radius); }
.type-row:hover { background: var(--bg); }
.type-token { font-family: 'SF Mono',monospace; font-size: 11px; color: var(--text-3); }
.type-meta { font-size: 12px; color: var(--text-2); }

/* ── NAMING CONVENTION ── */
.naming-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.naming-table th { padding: 9px 16px; background: var(--border-light); border-bottom: 1px solid var(--border); text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); }
.naming-table td { padding: 9px 16px; border-bottom: 1px solid var(--border-light); }
.naming-table tr:last-child td { border-bottom: none; }
.naming-table code { background: var(--border-light); padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; }

/* ── RESP TABLE ── */
.resp-diff { background: #fff7c2; border-radius: 3px; padding: 1px 5px; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(50px); background: #172b4d; color: #fff; padding: 9px 18px; border-radius: 6px; font-size: 12px; font-weight: 500; opacity: 0; transition: all 0.2s; z-index: 999; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar { transform: translateX(-100%); }
  .main { margin-left: 0; }
  .arch-grid { grid-template-columns: 1fr; }
  .arch-arrow { transform: rotate(90deg); }
}
</style>
</head>

// ═══════════════════════════════════ HELPERS
function resolveColor(ref) {
  const [g, s] = ref.split('/');
  if (primColors[g] && primColors[g][s]) return primColors[g][s][mode.v === 'light' ? 'l' : 'd'];
  return null;
}
function resolveSem(ref) {
  const [g, s] = ref.split('/');
  if (semColors[g] && semColors[g][s]) return resolveColor(semColors[g][s]);
  return resolveColor(ref);
}
function resolveMap(ref) {
  let c = resolveSem(ref);
  if (!c) c = resolveColor(ref);
  return c || '#ccc';
}
function hexToRgb(h) {
  if (!h || !h.startsWith('#')) return null;
  return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
}
function lum(r,g,b) {
  return [r,g,b].map(v => { v/=255; return v<=0.03928?v/12.92:((v+0.055)/1.055)**2.4; }).reduce((a,v,i)=>a+[0.2126,0.7152,0.0722][i]*v,0);
}
function cr(hex1,hex2) {
  const c1=hexToRgb(hex1),c2=hexToRgb(hex2);
  if(!c1||!c2)return null;
  const l1=lum(c1.r,c1.g,c1.b),l2=lum(c2.r,c2.g,c2.b);
  return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
}
function badge(ratio){
  if(!ratio)return'—';
  const r=ratio.toFixed(1);
  if(ratio>=7)return`<span class="badge badge-aaa">${r}:1 AAA</span>`;
  if(ratio>=4.5)return`<span class="badge badge-aa">${r}:1 AA</span>`;
  return`<span class="badge badge-fail">${r}:1 Fail</span>`;
}
function copy(text){
  navigator.clipboard.writeText(text);
  const t=document.getElementById('toast');
  t.textContent='Copied: '+text;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),1400);
}
function css(cat,name){return`--gloss-${cat.toLowerCase()}-${name.replace(/([A-Z])/g,'-$1').toLowerCase()}`.replace(/--gloss--/,'--gloss-');}
function sw(color){ return `<span class="mini-sw" style="background:${color||'#ccc'}"></span>`; }

    {n:'Text/today-primary on Surface/today-secondary', fg:'Today/500', bg:'Today/200'},
    {n:'Text/past-primary on Surface/past-secondary', fg:'Past/500', bg:'Past/200'},
    {n:'Text/future-primary on Surface/future-secondary', fg:'Future/500', bg:'Future/200'},
  ];
  let html = `<div class="page-header"><h1>Accessibility — Contrast Report</h1><p>WCAG 2.1 contrast ratios for standard token pairings. AA requires 4.5:1 for normal text, 3:1 for large text. AAA requires 7:1.</p></div>
  <div class="card"><table class="token-table"><thead><tr><th>Token Pair</th><th>Foreground</th><th>Background</th><th>Ratio</th><th>Normal text</th><th>Large text</th></tr></thead><tbody>`;
  for(const p of pairs){
    const fgCol = resolveSem(p.fg)||resolveColor(p.fg)||'#000';
    const bgCol = resolveSem(p.bg)||resolveColor(p.bg)||'#fff';
    const ratio = cr(fgCol,bgCol);
    const r = ratio?ratio.toFixed(2):null;
    const normal = ratio>=4.5?'<span class="badge badge-aaa">Pass</span>':'<span class="badge badge-fail">Fail</span>';
    const large  = ratio>=3  ?'<span class="badge badge-aaa">Pass</span>':'<span class="badge badge-fail">Fail</span>';
    html+=`<tr><td style="font-weight:500;font-size:12px">${p.n}</td>
      <td>${sw(fgCol)}<span class="mono" style="font-size:11px">${fgCol}</span></td>
      <td>${sw(bgCol)}<span class="mono" style="font-size:11px">${bgCol}</span></td>
      <td><strong>${r?r+':1':'—'}</strong></td>
      <td>${normal}</td><td>${large}</td></tr>`;
  }
  return html+'</tbody></table></div>';
}

function renderSpacingScale(){
  const html = `<div class="page-header"><h1>Spacing Scale</h1><p>Base 4px grid. All spacing tokens reference the primitive scale. Click to copy the CSS variable.</p></div>
  <div class="scale-list">
  ${Object.entries(spacingTokens).map(([n,v])=>`
    <div class="scale-row" onclick="copy('--gloss-spacing-${n}')">
      <span class="scale-name">spacing/${n}</span>
      <div class="scale-track" style="width:${Math.min((v/64)*100,100)}%"></div>
      <span class="scale-px">${v}px</span>
    </div>`).join('')}
  </div>
  <div style="margin-top:24px"><p class="section-label">Border Radius</p>
  <div class="scale-list">
  ${[['none',0],['sm',4],['md',6],['lg',8],['lger',12],['round',64]].map(([n,v])=>`
    <div class="scale-row" onclick="copy('--gloss-radius-${n}')">
      <span class="scale-name">radius/${n}</span>
      <div class="scale-track" style="width:${Math.min((v/64)*100,100)}%;border-radius:${v}px"></div>
      <span class="scale-px">${v}px</span>
    </div>`).join('')}
  </div></div>`;
  return html;
}

function renderSpacingCode(){
  const lines = Object.entries(spacingTokens).map(([n,v])=>`--gloss-spacing-${n}: ${v}px;`);
  const radii = [['none',0],['sm',4],['md',6],['lg',8],['lger',12],['round',64]].map(([n,v])=>`--gloss-radius-${n}: ${v}px;`);
  return `<div class="page-header"><h1>Code · Spacing</h1></div>
  <div class="card"><div class="card-header"><h3>CSS Variables</h3><button onclick="copy(document.getElementById('sp-block').textContent)" style="padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);font-size:12px;cursor:pointer;font-weight:600">Copy All</button></div>
  <pre id="sp-block" style="padding:20px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.8;color:var(--text-2)">:root {\n  /* Spacing */\n  ${lines.join('\n  ')}\n\n  /* Border Radius */\n  ${radii.join('\n  ')}\n}</pre></div>`;
}

function renderTypePreview(){
  let html = `<div class="page-header"><h1>Typography</h1><p>Montserrat for headings and body, D-DIN-PRO for numbers. All sizes in px.</p></div>
  <div class="card"><div class="type-rows">`;
  for(const[name,t] of Object.entries(typeTokens)){
    const isH = name.startsWith('h');
    const previewPx = Math.min(t.s,40);
    html+=`<div class="type-row">
      <span class="type-token">--gloss-font-size-${name}</span>
      <span class="type-meta">${t.s}px / ${t.lh}px</span>
      <span class="type-preview" style="font-size:${previewPx}px;font-weight:${isH?700:400};line-height:1.2;letter-spacing:${isH?'-0.02em':'0'}">The quick brown fox</span>
    </div>`;
  }
  html+=`</div></div>`;
  return html;
}

function renderTypeSpecs(){
  return `<div class="page-header"><h1>Type Specs</h1></div>
  <div class="card"><table class="token-table"><thead><tr><th>Token</th><th>Size</th><th>Line Height</th><th>Weight</th><th>Font</th></tr></thead><tbody>
  ${Object.entries(typeTokens).map(([n,t])=>`<tr onclick="copy('--gloss-font-size-${n}')">
    <td class="mono">--gloss-font-size-${n}</td>
    <td class="mono">${t.s}px</td>
    <td class="mono">${t.lh}px</td>
    <td>${n.startsWith('h')?'700 Bold':'400 Regular'}</td>
    <td class="text-muted">${n==='number'?'D-DIN-PRO':'Montserrat'}</td>
  </tr>`).join('')}
  </tbody></table></div>
  <div class="card" style="margin-top:16px"><div class="card-header"><h3>Font Families</h3></div>
  <table class="token-table"><thead><tr><th>Token</th><th>Value</th><th>Usage</th></tr></thead><tbody>
  <tr onclick="copy('--gloss-font-heading')"><td class="css-var">--gloss-font-heading</td><td class="mono">Montserrat</td><td>H1–H6</td></tr>
  <tr onclick="copy('--gloss-font-body')"><td class="css-var">--gloss-font-body</td><td class="mono">Montserrat</td><td>Body text, labels, captions</td></tr>
  <tr onclick="copy('--gloss-font-number')"><td class="css-var">--gloss-font-number</td><td class="mono">D-DIN-PRO</td><td>Numerical data, stats, dates</td></tr>
  </tbody></table></div>`;
}

function renderRespSpacing(){
  return `<div class="page-header"><h1>Responsive Spacing</h1><p>Highlighted cells differ from Desktop. Spacing/lg reduces from 24px to 12px on mobile.</p></div>
  <div class="card"><table class="token-table"><thead><tr><th>Token</th><th>CSS Variable</th><th>Desktop</th><th>Tablet</th><th>Mobile</th></tr></thead><tbody>
  ${Object.entries(respSpacing).map(([n,v])=>`<tr onclick="copy('--gloss-spacing-${n}')">
    <td class="mono">spacing/${n}</td>
    <td class="css-var">--gloss-spacing-${n}</td>
    <td class="mono">${v.d}px</td>
    <td class="mono">${v.t}px</td>
    <td class="mono">${v.m!==v.d?`<span class="resp-diff">${v.m}px</span>`:`${v.m}px`}</td>
  </tr>`).join('')}
  </tbody></table></div>`;
}

function renderRespType(){
  const rows = [
    {n:'body-sm',d:12,t:12,m:12,lhd:20,lht:20,lhm:20},
    {n:'body-md',d:16,t:16,m:16,lhd:24,lht:24,lhm:24},
    {n:'body-lg',d:20,t:20,m:20,lhd:32,lht:32,lhm:32},
    {n:'h6',d:20,t:20,m:20,lhd:24,lht:24,lhm:24},

  </tbody></table></div>`;

function renderA11yReport(){
  return renderMappingA11y();
}

function renderA11yGuide(){
  return `<div class="page-header"><h1>Accessibility Guidelines</h1><p>Rules for using GLOSS tokens accessibly.</p></div>
  <div class="card"><div class="card-header"><h3>WCAG 2.1 Requirements</h3></div>
  <table class="naming-table"><thead><tr><th>Level</th><th>Ratio</th><th>Use Case</th></tr></thead><tbody>
  <tr><td><span class="badge badge-fail">Fail</span></td><td>&lt; 3:1</td><td>Avoid for all text and meaningful UI</td></tr>
  <tr><td><span class="badge badge-aa">AA Large</span></td><td>3:1</td><td>Large text (18px+ regular, 14px+ bold)</td></tr>
  <tr><td><span class="badge badge-aa">AA</span></td><td>4.5:1</td><td>Normal body text — minimum requirement</td></tr>
  <tr><td><span class="badge badge-aaa">AAA</span></td><td>7:1</td><td>Enhanced accessibility — aim for key text</td></tr>
  </tbody></table></div>
  <div class="card" style="margin-top:16px"><div class="card-header"><h3>Recommended Token Pairings</h3></div>
  <table class="naming-table"><thead><tr><th>Use Case</th><th>Foreground</th><th>Background</th></tr></thead><tbody>
  <tr><td>Primary headings</td><td><code>--gloss-text-headings</code></td><td><code>--gloss-surface-primary</code></td></tr>
  <tr><td>Body text</td><td><code>--gloss-text-body</code></td><td><code>--gloss-surface-primary</code></td></tr>
  <tr><td>CTA / Action button</td><td><code>--gloss-text-on-action</code></td><td><code>--gloss-surface-on-action</code></td></tr>
  <tr><td>Error messages</td><td><code>--gloss-text-error</code></td><td><code>--gloss-surface-primary</code></td></tr>
  <tr><td>Disabled state</td><td><code>--gloss-text-disabled</code></td><td><code>--gloss-surface-disabled</code></td></tr>
  <tr><td>Today badge text</td><td><code>--gloss-text-today-primary</code></td><td><code>--gloss-surface-today-secondary</code></td></tr>
  </tbody></table></div>
  <div class="card" style="margin-top:16px"><div class="card-header"><h3>Tokens to Avoid for Text</h3></div>
  <table class="naming-table"><thead><tr><th>Token</th><th>Reason</th></tr></thead><tbody>
  <tr><td><code>--gloss-text-disabled</code></td><td>Intentionally low contrast — only valid for disabled UI states, never for informational text</td></tr>
  <tr><td><code>--gloss-text-tertiary</code></td><td>Borderline AA — avoid for long-form body copy, OK for captions and labels</td></tr>
  <tr><td>Any Primitive token</td><td>Contrast is not guaranteed at the primitive level — always use Mapping tokens</td></tr>
  </tbody></table></div>`;
}

function setMode(m){
  mode.v = m;
  document.querySelectorAll('.mode-toggle button').forEach(b=>{
    b.classList.toggle('active', b.textContent.includes(m==='light'?'Light':'Dark'));
  });
  renderContent();
}
